<div *ngIf="pattern">
    <main class="link">
        <app-breadcrumb [items]="[
    { label: 'Inicio', url: '/' },
    { label: 'Patrones', url: '/patrones' },
    { label: pattern.title }
    ]">
        </app-breadcrumb>
    </main>
    <div class="patron">

        <h2>{{ pattern.title }}</h2>
        <div class="introduccion">
            <img [src]="pattern.imageUrl" [alt]="pattern.title" class="img-patron">
            <div class="patron-materiales">
                <p>MATERIALES</p>
                <ul>
                    <li *ngFor="let material of pattern.materials">{{ material }}</li>
                </ul>
                <p>ABREVIATURAS</p>
                <table>
                    <tr *ngFor="let row of getRows(pattern.abbreviations, 2)">
                        <td *ngFor="let item of row">
                            {{ item }}
                        </td>
                    </tr>
                </table>
            </div>
        </div>
        <div class="instrucciones">
            <div class="descripcion" [innerHTML]="pattern.description"></div>
        </div>
    </div>
</div>
