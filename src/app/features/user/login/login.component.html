<form (ngSubmit)="login()">
    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" [(ngModel)]="email" name="email" required>
    </div>
    <div>
        <label for="password">Password:</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" required>
    </div>
    <button type="submit">Iniciar sesión</button>
    <button type="button" (click)="loginWithGoogle()">Iniciar sesión con Google</button>

    <p>¿No tienes una cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    <p>¿Olvidaste tu contraseña? <a routerLink="/reset-password">Recupérala aquí</a></p>

  <p class="error-message" *ngIf="error">{{ error }}</p>
  <p class="success-message" *ngIf="message">{{ message }}</p>
  <button class="btnResend"*ngIf="error == 'Verifica tu correo primero'" (click)="resendVerificationEmail()">Reenviar correo de verificación </button>
</form>
