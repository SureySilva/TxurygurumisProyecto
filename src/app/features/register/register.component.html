<form (ngSubmit)="register()">
  <div>
    <label for="displayName">Nombre de usuario:</label>
    <input type="text" [(ngModel)]="displayName" name="displayName" required>
  </div>
  <div>
    <label for="email">Correo electrónico:</label>
    <input type="email" [(ngModel)]="email" name="email" required>
  </div>
  <div>
    <label for="password">Contraseña:</label>
    <input type="password" [(ngModel)]="password" name="password" required minlength="6" maxlength="20">
    <label for="confirmPassword">Confirmar contraseña:</label>
    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required minlength="6" maxlength="20">
  </div>
  <button type="submit">Registrar</button>
  <div class="popup" *ngIf="showMessage">
    Usuario registrado correctamente
  </div>

  <p class="error-message" *ngIf="error">{{ error }}</p>
</form>
