<div class="pagina">
    <app-header />
    <app-nav />
    <main class="contenido">
        <router-outlet />
    </main>
    <app-footer />
    <ng-container *ngIf="toast$ | async as toast">
        <div class="app-toast" [ngClass]="toast.type">
            <span *ngIf="toast.type === 'success'">✔</span>
            <span *ngIf="toast.type === 'error'">✖</span>
            <span *ngIf="toast.type === 'info'">ℹ</span>
            {{ toast.text }}
        </div>
    </ng-container>
</div>
